name: Minify and Clean Code

on:
  push:
    branches:
      - production

jobs:
  optimize_code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove comments and writeLog() calls
        run: |
          find . -type f -name "*.php" -exec sed -i '/\/\/.*/d; /\/\*/,/\*\//d' {} +
          find . -type f -name "*.js" -exec sed -i '/\/\/.*/d; /\/\*/,/\*\//d; /writeLog(.*);/d' {} +

      - name: Minify PHP
        run: |
          find . -type f -name "*.php" -exec php -w {} \; > temp && mv temp {}

      - name: Minify JavaScript
        uses: nizarmah/mini-deploy@v1
        with:
          branch: production
          minify_js: true
          minify_css: false
          minify_html: false

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Auto-minify and clean code"
          git push
